font_family JetBrainsMono Nerd Font Mono
font_size 10

disable_ligatures no
enable_audio_bell no

shell              fish
shell_intergration disable

cursor_shape block

url_style curly

remember_window_size no
initial_window_width 640
initial_window_height 480
window_padding_width 27
cursor_blink_interval 0 
hide_window_decorations yes

background_opacity 0.80
confirm_os_window_close 0

scrollbar_handle_opacity 0
scrollbar_track_opacity 0
srollbar_track_hover_opacity 0

#sync_to_monitor no

#theme
# Monokai

background #1e1e1e
foreground #f8f8f2
cursor #f8f8f2
selection_background #f8f8f2
selection_foreground #272822
active_tab_background #75715e
active_tab_foreground #272822
active_border_color #75715e
inactive_tab_background #272822
inactive_tab_foreground #75715e
inactive_border_color #75715e
url_color #f8f8f2

# 16 Color Space

