font_family JetBrainsMono Nerd Font Mono
font_size 10

disable_ligatures no
enable_audio_bell no

shell              fish
shell_intergration disable

cursor_shape block

url_style curly

remember_window_size no
initial_window_width 640
initial_window_height 480
window_padding_width 27
cursor_blink_interval 0 
hide_window_decorations yes

background_opacity 0.80
confirm_os_window_close 0

scrollbar_handle_opacity 0
scrollbar_track_opacity 0
srollbar_track_hover_opacity 0

sync_to_monitor no

#theme
# graphite mono

background #1e2024
foreground #d1d2d3
cursor #787c99
selection_background #3e4452
selection_foreground #ffffff
active_tab_background #2c3036
active_tab_foreground #ffffff
active_border_color #51576d
inactive_tab_background #1e2024
inactive_tab_foreground #565f89
inactive_border_color #2f333d
url_color #82aaff

