background {
    monitor =
    # path = /home/$USER/.config/hypr/wall2.png   # supports png, jpg, webp (no animations, though)
    path = ~/.config/hypr/Wallpapers/Graphite Mono/23. Graphite Mono.jpg   # supports png, jpg, webp (no animations, though)
    # color = rgba(25, 20, 20, 0.7)
    color = rgba(0, 0, 0, 0.7)

    # all these options are taken from hyprland, see https://wiki.hyprland.org/Configuring/Variables/#blur for explanations
    blur_passes = 2 # 0 disables blurring
    blur_size = 4
    noise = 0.1
    # contrast = 0.8916
    # brightness = 0.8172
    # vibrancy = 0.1696
    # vibrancy_darkness = 0.0
}

input-field {
    monitor =
    size = 150, 30
    outline_thickness = 1
    dots_size = 0.5; # Scale of input-field height, 0.2 - 0.8
    dots_spacing = 1 # Scale of dots' absolute size, 0.0 - 1.0
    dots_center = true
    dots_rounding = -1 # -1 default circle, -2 follow input-field rounding
    outer_color = rgba(0, 0, 0, 0)
    inner_color = rgba(0, 0, 0, 0)
    font_color = rgb(255, 250, 250)
    fade_on_empty = true
    fade_timeout = 1000 # Milliseconds before fade_on_empty is triggered.
    hide_input = false
    check_color = rgb(204, 136, 34)
    fail_color = rgb(204, 34, 34) # if authentication failed, changes outer_color and fail message color
    fail_text = <i>$FAIL <b>($ATTEMPTS)</b></i> # can be set to empty
    fail_transition = 300 # transition time in ms between normal outer_color and fail_color
    capslock_color = -1
    numlock_color = -1
    bothlock_color = -1 # when both locks are active. -1 means don't change outer color (same for above)
    invert_numlock = false # change color if numlock is off
    swap_font_color = false # see below

    position = 0, -150
    halign = center
    valign = center
}

label {
    monitor =
    #text = cmd[update:1000] echo "$(date +%Y-%m-%d)"
    text = cmd[update:1000] echo "$(date +%T)"
    color = rgba(200, 200, 200, 1.0)
    font_size = 50
    font_family = JetBrainsMono Nerd Font italic
    rotate = 0 # degrees, counter-clockwise

    position = 0, 275
    halign = center
    valign = bottom
}

label {
    monitor =
    text = cmd[update:1000] echo "$USER"
    color = rgba(200, 200, 200, 0.8)
    font_size = 80
    font_family = JetBrainsMono Nerd Font bold
    rotate = 0 # degrees, counter-clockwise

    position = 30, -10
    halign = left
    valign = top
}

label {
    monitor =
    text = cmd[update:1000] $HOME/.config/hypr/Scripts/mpris.sh
    color = rgba(200, 200, 200, 0.7)
    font_size = 12
    font_family = JetBrainsMono Nerd Font Mono
    rotate = 0 # degrees, counter-clockwise

    position = 0, 10
    halign = center
    valign = bottom
}

image {
    monitor =
    path = ~/.config/hypr/img/bb.jpg
    size = 200 # Radius of the image
    border_size = 8
    border_color = rgba(200, 200, 200, 0.5)
    position = 0, 100
    halign = center
    valign = center
}

image {
    monitor =
    path = ~/.config/hypr/img/bb.jpg
    size = 200 # Radius of the image
    border_size = 18
    border_color = rgba(200, 200, 200, 0.3)
    position = 0, 100
    halign = center
    valign = center
}
